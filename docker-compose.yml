version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: trello_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: trello-clone

  redis:
    image: redis:7-alpine
    container_name: trello_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: trello_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - redis
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/trello-clone
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@trelloclone.com}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: trello_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000

volumes:
  mongo_data:
  redis_data:
  uploads_data:
